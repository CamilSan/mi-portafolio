<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repositorio - En desarrollo</title>
    <style>
        
        :root {
            --deep-walnut: #56351E;
            --azure-mist: #EDF7F6;
            --sandy-brown: #F19953;
            --copper: #C47335;
            --baltic-blue: #2660A4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--azure-mist);
            color: var(--deep-walnut);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background-color: rgba(255, 255, 255, 0.4);
            border-bottom: 2px solid var(--baltic-blue);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--copper);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            background: transparent;
            color: var(--baltic-blue);
            border: 2px solid var(--baltic-blue);
            padding: 0.5rem 1.2rem;
            border-radius: 0.375rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: not-allowed;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-color: var(--baltic-blue);
            color: var(--azure-mist);
            box-shadow: 0 0 12px rgba(38, 96, 164, 0.3); 
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--baltic-blue), var(--copper));
            /*-webkit-background-clip: text;*/
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.35rem;
            color: var(--deep-walnut);
            opacity: 0.85;
        }

        .pulse {
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.85; }
            50% { opacity: 0.5; color: var(--baltic-blue); }
            100% { opacity: 0.85; }
        }

        @media (max-width: 768px) {
            header {
                padding: 1.5rem;
            }
            h1 {
                font-size: 3.5rem;
            }
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 1.5rem;
                padding: 1.5rem;
            }
            nav {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
            .nav-btn {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
            h1 {
                font-size: 2.5rem;
                margin-bottom: 1rem;
            }
            p {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Workspace</div>
        <nav>
            <button class="nav-btn" type="button">Flujos</button>
            <button class="nav-btn" type="button">APIs</button>
            <button class="nav-btn" type="button">Contacto</button>
        </nav>
    </header>

    <main>
        <h1>En desarrollo...</h1>
        <p class="pulse">Próximamente publicaré mis proyectos aquí.</p>
    </main>

</body>
</html>
